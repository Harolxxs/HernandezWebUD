<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Aspirante UD</title>
   <h:outputStylesheet name="css/styles.css" />
</h:head>
<h:body>
    <h:form id="aspiranteForm">
        <h2>Datos del Aspirante</h2>

        <h:outputLabel for="id_p" value="No. Identificación:" />
      	
      	<h:inputText id="id_p" value="#{asp.dto.id_p}" required="true">
    <f:validateLongRange minimum="1" />
</h:inputText>
      
        <br /><br />

        <h:outputLabel for="nombres" value="Nombres:" />
        <h:inputText id="nombres" value="#{asp.dto.nombres}" required="true"
                     requiredMessage="El campo Nombres es obligatorio."
                     validatorMessage="Los Nombres deben contener solo letras.">
            <f:validateRegex pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+" />
        </h:inputText>
        <br /><br />

        <h:outputLabel for="apellidos" value="Apellidos:" />
        <h:inputText id="apellidos" value="#{asp.dto.apellidos}" required="true"
                     requiredMessage="El campo Apellidos es obligatorio."
                     validatorMessage="Los Apellidos deben contener solo letras.">
            <f:validateRegex pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+" />
        </h:inputText>
        <br /><br />

        <h:outputLabel for="telefono" value="Teléfono:" />
        <h:inputText id="telefono" value="#{asp.dto.telefono}" required="true"
                     requiredMessage="El campo Teléfono es obligatorio."
                     validatorMessage="El Teléfono debe contener exactamente 10 dígitos numéricos.">
            <f:validateRegex pattern="[0-9]{10}" />
        </h:inputText>
        <br /><br />

        <h:outputLabel for="correo" value="Correo:" />
        <h:inputText id="correo" value="#{asp.dto.correo}" required="true"
                     requiredMessage="El campo Correo es obligatorio." />
        <br /><br />

       <h:outputLabel for="pro_aca" value="Programa Académico: " />

<h:selectOneMenu id="pro_aca" value="#{asp.dto.pro_acad.cod}">
    
    <f:selectItem itemValue="#{-1}" itemLabel="-- seleccione --" />

    <f:selectItems value="#{asp.listaPa}" var="p"
        itemValue="#{p.cod}"
        itemLabel="#{p.nombre_prog}" />
        
</h:selectOneMenu>

<br /><br />

        <h:messages globalOnly="false" style="color:red; font-weight:bold;" layout="list" />

    <h:commandButton value="Registrar" action="#{asp.registrar}">
   
</h:commandButton>

<br /><br />

<h:panelGroup rendered="#{not empty asp.listaAs}">
    <h3>Aspirantes registrados</h3>
    <h:dataTable value="#{asp.listaAs}" var="aspirante" varStatus="status" border="1" style="width:80%">
        <h:column>
            <f:facet name="header">N°.</f:facet>
            <h:outputText value="#{status.index + 1}" />
        </h:column>
        <h:column>
            <f:facet name="header">Fecha Registro</f:facet>
            <h:outputText value="#{aspirante.fecha_reg}" />
        </h:column>
        <h:column>
            <f:facet name="header">Nombres</f:facet>
            <h:outputText value="#{aspirante.nombres}" />
        </h:column>
        <h:column>
            <f:facet name="header">Apellidos</f:facet>
            <h:outputText value="#{aspirante.apellidos}" />
        </h:column>
        <h:column>
            <f:facet name="header">Teléfono</f:facet>
            <h:outputText value="#{aspirante.telefono}" />
        </h:column>
        <h:column>
            <f:facet name="header">Correo</f:facet>
            <h:outputText value="#{aspirante.correo}" />
        </h:column>
    </h:dataTable>
</h:panelGroup>
    </h:form>

    <footer>
        <a href="index.xhtml">Inicio</a>
        <br/><br/><br/><br/>
        <h4>Harol Andres Hernandez Cruz  -  Programación Avanzada- 578-302 -harahernandezc@udistrital.edu.co - Universidad Distrital Francisco Jose de Caldas -  2026  -</h4>
    </footer>
</h:body>
</html>
