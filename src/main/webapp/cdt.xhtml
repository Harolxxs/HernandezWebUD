<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
<h:outputStylesheet name="cdt-style.css" library="css"/>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>Simulador CDT</title>
</h:head>
<h:body>
    <div class="form-container">
        <h:form>
            <div class="form-title">Simulador CDT</div>       
            <h:outputLabel for="inversion" value="Inversión:" styleClass="label"/>
            <h:inputText id="inversion" value="#{cdt.inversion}" required="true"  styleClass="input">
             
                <f:convertNumber maxFractionDigits="2" />
            </h:inputText>

            <h:outputLabel for="interes" value="Interés (% E.A.):" styleClass="label"/>
            <h:inputText id="interes" value="#{cdt.interes}" required="true" styleClass="input"/>

            <h:outputLabel for="plazo" value="Plazo (días):" styleClass="label"/>
            <h:inputText id="plazo" value="#{cdt.plazo}" required="true" styleClass="input"/>
            
                    <h:messages globalOnly="false" style="color:red; font-weight:bold;" layout="list" />
            <h:commandButton value="Calcular Ganancia"
                             action="#{cdt.calcular}"
                             styleClass="btn">
                <f:ajax execute="@form" render="@form"/>
            </h:commandButton>
            <h:panelGroup rendered="#{cdt.ganancia > 0}" layout="block" styleClass="result">

                <h:outputText value="Valor Ganancia: " />
                <h:outputText value="#{cdt.ganancia}">
                    <f:convertNumber type="currency" currencySymbol="$" maxFractionDigits="2" groupingUsed="true" />
                </h:outputText>
                <br/><br/>

                <h:outputText value="Valor final al vencimiento: " />
                <h:outputText value="#{cdt.valorFuturo - cdt.impuesto}">
                    <f:convertNumber type="currency" currencySymbol="$" maxFractionDigits="2" groupingUsed="true" />
                </h:outputText>
                <br/><br/>

                <h:outputText value="Valor impuesto 4%: " />
                <h:outputText value="#{cdt.impuesto}">
                    <f:convertNumber type="currency" currencySymbol="$" maxFractionDigits="2" groupingUsed="true" />
                </h:outputText>
                <br/><br/>

                <h:outputText value="Ganancia después de impuestos: " />
                <h:outputText value="#{cdt.ganancia - cdt.impuesto}">
                    <f:convertNumber type="currency" currencySymbol="$" maxFractionDigits="2" groupingUsed="true" />
                </h:outputText>
            </h:panelGroup>

        </h:form>

    </div>
    <footer style="text-align:center; margin-top:40px; font-size:12px; color:#6e6e73;">
        <a href="index.xhtml" style="text-decoration:none; color:#0071e3;">Inicio</a>
        <br/><br/>
        <h4>
            Harol Andres Hernandez Cruz - Programación Avanzada - 578-302 - 
            harahernandezc@udistrital.edu.co - Universidad Distrital Francisco Jose de Caldas - 2026
        </h4>
    </footer>
</h:body>
</html>
